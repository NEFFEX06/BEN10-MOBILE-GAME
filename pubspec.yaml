name: ben10_mobile_game
description: Ben 10 Mobile Simulation Game with High Graphics, Aliens, Missions, and Epic Story.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  get: ^4.6.5
  
  # Graphics & Animation
  flame: ^1.10.0
  flutter_animate: ^4.0.0
  lottie: ^2.4.0
  
  # Networking & API
  http: ^1.1.0
  dio: ^5.3.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  
  # UI & Design
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Audio
  just_audio: ^0.9.31
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  equatable: ^2.0.5
  
  # Image Processing
  image: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/characters/
    - assets/aliens/
    - assets/missions/
    - assets/ui/
    - assets/audio/music/
    - assets/audio/sfx/
    - assets/animations/
  
  fonts:
    - family: Ben10Font
      fonts:
        - asset: assets/fonts/ben10_font.ttf
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
